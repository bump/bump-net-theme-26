<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ if .IsHome }}{{ .Site.Params.site_description }}{{ else }}{{ .Summary | plainify }}{{ end }}">

<!-- Canonical & feeds -->
<link rel="canonical" href="{{ .Permalink }}">
<link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ .Site.BaseURL }}feed.xml">

<!-- IndieWeb / Micro.blog -->
<link rel="me" href="https://micro.blog/bump">
<link rel="micropub" href="https://micro.blog/micropub">
<link rel="authorization_endpoint" href="https://indieauth.com/auth">
<link rel="token_endpoint" href="https://tokens.indieauth.com/token">
<link rel="webmention" href="https://webmention.io/bump.net/webmention">
<link rel="pingback" href="https://webmention.io/bump.net/xmlrpc">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ .Site.BaseURL }}css/style.css">
